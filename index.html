<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2>Login</h2>

        <form id="form">

            <div class="input-box">
                <input type="email" id="email" placeholder="Email">
            </div>

            <div class="input-box">
                <input type="password" id="senha" placeholder="Senha">
            </div>

            <div class="links">
                <label>
                    <input type="checkbox"> Lembrar
                </label>
                <a href="#">Esqueceu?</a>
            </div>

            <button type="submit">LOGIN</button>

            <p id="mensagem"></p>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
